name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      VITE_GISCUS_REPO: ${{ secrets.VITE_GISCUS_REPO }}
      VITE_GISCUS_REPO_ID: ${{ secrets.VITE_GISCUS_REPO_ID }}
      VITE_GISCUS_CATEGORY: ${{ secrets.VITE_GISCUS_CATEGORY }}
      VITE_GISCUS_CATEGORY_ID: ${{ secrets.VITE_GISCUS_CATEGORY_ID }}
      # 自定义域名下部署需要根路径，保持默认 GitHub Pages 项目页则去掉或改为 /blog/
      VITEPRESS_BASE: "/"
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        # 不指定 version，自动从 package.json 的 packageManager 字段读取
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run docs:build

      - name: Add CNAME file
        run: echo "anwesende.cn" > ./docs/.vitepress/dist/CNAME

      - name: List build output
        run: ls -la ./docs/.vitepress/dist/

      - name: Deploy
        # 将构建产物 commit 到一个分支上，用于发布静态站点资源
        # https://github.com/peaceiris/actions-gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
          publish_branch: gh-pages
          full_commit_message: ${{ github.event.head_commit.message }}
          keep_files: true
